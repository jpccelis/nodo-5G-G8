# -----------------------------------------------------------------------------
# Plantilla de configuracion. COPIA este archivo a "config.ini" y editalo.
#   cp config.example.ini config.ini
# config.ini NO se sube a GitHub (esta en .gitignore) porque puede tener datos
# propios de cada nodo.
# -----------------------------------------------------------------------------

[nodo]
node_id = nodo1               
intervalo_segundos = 10
n_medir_por_transmision = 4
buffer_path = buffer.jsonl    

[mqtt]
# Para la prueba del viernes usamos un broker publico GRATIS (sin registro).
# Asi puedes VER los datos llegar desde tu celular o el navegador.
broker = broker.emqx.io
port = 1883
# Pon un topic UNICO tuyo para no mezclarte con otra gente del mundo.
# Cambia "p8xxxx" por algo random (ej: tus iniciales + numeros).
topic = vitiscience/p8jpc/nodo1/clima
