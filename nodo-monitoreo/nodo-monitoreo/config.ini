
# config.example.ini — Plantilla de configuracion VitiScience Nodo P8


[nodo]
node_id = nodo1
t_medir_segundos = 900
t_transmitir_segundos = 3600
ventana_muestras      = 4            # muestras en la ventana deslizante
buffer_path           = buffer.jsonl # archivo de store-and-forward local

# MAC de la ESP32 que lee el AHT10 y transmite por BLE.
esp32_mac = e8:68:e7:2f:23:56

# --- Duty cycling del HAT 5G ---
hat_control = gpio
hat_gpio_pin    = 23
hat_pwrkey_ms   = 500
hat_boot_wait_s = 15

[mqtt]
broker = broker.emqx.io
port   = 1883
topic  = vitiscience/nodo1/clima
