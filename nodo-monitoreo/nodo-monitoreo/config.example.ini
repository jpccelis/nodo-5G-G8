# -----------------------------------------------------------------------------
# config.example.ini — Plantilla de configuracion VitiScience Nodo P8
# COPIA este archivo a config.ini y editalo:
#   cp config.example.ini config.ini
# config.ini NO se sube a GitHub (esta en .gitignore).
# -----------------------------------------------------------------------------

[nodo]
node_id               = nodo1        # identificador unico de este nodo
t_medir_segundos      = 10           # cada cuanto toma una muestra del sensor
t_transmitir_segundos = 40           # cada cuanto transmite por MQTT
ventana_muestras      = 4            # muestras en la ventana deslizante
buffer_path           = buffer.jsonl # archivo de store-and-forward local

# MAC de la ESP32 (solo si usas sensor BLE en vez del AHT10 local)
esp32_mac = XX:XX:XX:XX:XX:XX

# --- Duty cycling del HAT 5G ---
# hat_control: "mmcli" (facil, sin GPIO) o "gpio" (mayor ahorro energetico)
# Empieza con "mmcli". Cambia a "gpio" cuando tengas el pin confirmado con Vicente.
hat_control     = mmcli
# hat_gpio_pin: numero de pin BCM del PWRKEY del Calyx (ver esquematico)
hat_gpio_pin    = 4
# hat_pwrkey_ms: duracion del pulso de encendido/apagado en milisegundos
hat_pwrkey_ms   = 500
# hat_boot_wait_s: segundos de espera tras encender para que el modem se registre
hat_boot_wait_s = 15

[mqtt]
# Broker publico para pruebas. Cambiar a broker propio en produccion.
broker = broker.emqx.io
port   = 1883
# Usa un topic unico para no mezclarte con otros nodos del mundo.
topic  = vitiscience/p8xxxx/nodo1/clima
